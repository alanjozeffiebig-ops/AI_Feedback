<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback – AI školenie</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0f1a;
      --surface:  #131929;
      --border:   #1e2d47;
      --accent:   #4f8ef7;
      --accent2:  #7c3aed;
      --text:     #e8edf5;
      --muted:    #8494ae;
      --success:  #22c984;
      --radius:   14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px 60px;
    }

    /* ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse at center, rgba(79,142,247,.18) 0%, rgba(124,58,237,.10) 40%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 24px 80px rgba(0,0,0,.5);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(79,142,247,.12);
      border: 1px solid rgba(79,142,247,.25);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 100px;
      margin-bottom: 20px;
    }
    .badge svg { width:13px; height:13px; }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.5rem, 5vw, 1.95rem);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #e8edf5 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .field { margin-bottom: 28px; }

    /* ─── Star rating ─── */
    .stars {
      display: flex;
      gap: 10px;
      flex-direction: row-reverse;
      justify-content: flex-end;
    }
    .stars input { display: none; }
    .stars label {
      font-size: 36px;
      color: #2a3a52;
      cursor: pointer;
      margin: 0;
      padding: 0;
      text-transform: none;
      letter-spacing: 0;
      transition: color .15s, transform .15s;
      line-height: 1;
    }
    .stars label:hover,
    .stars label:hover ~ label,
    .stars input:checked ~ label {
      color: #f5c518;
    }
    .stars label:hover { transform: scale(1.15); }

    /* ─── Textarea / input ─── */
    textarea, input[type="text"], input[type="email"] {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14.5px;
      padding: 13px 16px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      resize: vertical;
    }
    textarea:focus, input[type="text"]:focus, input[type="email"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,.15);
    }
    textarea { min-height: 90px; }
    input::placeholder, textarea::placeholder { color: #4a5568; }

    /* ─── Checkbox group ─── */
    .check-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .check-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .check-item:hover {
      border-color: rgba(79,142,247,.4);
      background: rgba(79,142,247,.06);
    }
    .check-item input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--accent);
      flex-shrink: 0;
      cursor: pointer;
    }
    .check-item span {
      font-size: 14px;
      color: var(--text);
      font-weight: 400;
    }

    /* ─── Submit button ─── */
    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 6px 24px rgba(79,142,247,.3);
      margin-top: 8px;
    }
    .btn:hover { opacity: .92; transform: translateY(-1px); box-shadow: 0 10px 32px rgba(79,142,247,.4); }
    .btn:active { transform: translateY(0); }

    /* ─── Success state ─── */
    #success {
      display: none;
      text-align: center;
      padding: 20px 0 8px;
    }
    #success .icon {
      font-size: 56px;
      margin-bottom: 16px;
      display: block;
    }
    #success h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      color: var(--success);
      margin-bottom: 10px;
    }
    #success p { color: var(--muted); font-size: 15px; line-height: 1.6; }

    .footer-note {
      text-align: center;
      color: #3a4a62;
      font-size: 12px;
      margin-top: 28px;
    }
  </style>
</head>
<body>
<div class="card">

  <!-- Header -->
  <div class="badge">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    Scholaris · AI školenie
  </div>
  <h1>Tvoj feedback<br>nám pomáha rásť</h1>
  <p class="sub">2 minúty. Žiadna registrácia. Veľká pomoc. 🙏</p>

  <!-- Form -->
  <form id="feedbackForm" action="https://formspree.io/f/xnjkqpkl" method="POST">

    <!-- Hidden fields -->
    <input type="hidden" name="_subject" value="🎓 Nový feedback – AI školenie Scholaris" />
    <input type="hidden" name="_next" value="about:blank" />

    <!-- 1. Star rating -->
    <div class="field">
      <label>Ako hodnotíš školenie celkovo?</label>
      <div class="stars">
        <input type="radio" name="hodnotenie" id="s5" value="5 hviezdičiek ⭐⭐⭐⭐⭐" required />
        <label for="s5" title="5">★</label>
        <input type="radio" name="hodnotenie" id="s4" value="4 hviezdičky ⭐⭐⭐⭐" />
        <label for="s4" title="4">★</label>
        <input type="radio" name="hodnotenie" id="s3" value="3 hviezdičky ⭐⭐⭐" />
        <label for="s3" title="3">★</label>
        <input type="radio" name="hodnotenie" id="s2" value="2 hviezdičky ⭐⭐" />
        <label for="s2" title="2">★</label>
        <input type="radio" name="hodnotenie" id="s1" value="1 hviezdička ⭐" />
        <label for="s1" title="1">★</label>
      </div>
    </div>

    <div class="divider"></div>

    <!-- 2. Páčilo / nepáčilo -->
    <div class="field">
      <label>Čo sa ti páčilo?</label>
      <textarea name="pacilo_sa" placeholder="Napr. praktické ukážky, tempo, príklady zo života…" rows="3"></textarea>
    </div>

    <div class="field">
      <label>Čo by si zmenil / vylepšil?</label>
      <textarea name="nepacilo_sa" placeholder="Napr. viac času na cvičenia, menej teórie…" rows="3"></textarea>
    </div>

    <div class="divider"></div>

    <!-- 3. Čo by chceli na ďalšom školení -->
    <div class="field">
      <label>Čo by si chcel vidieť na ďalšom školení?</label>
      <div class="check-group">
        <label class="check-item">
          <input type="checkbox" name="temy[]" value="Pokročilé promptovanie a prompt engineering" />
          <span>Pokročilé promptovanie a prompt engineering</span>
        </label>
        <label class="check-item">
          <input type="checkbox" name="temy[]" value="Claude / ChatGPT pre kancelársku prácu (maily, dokumenty)" />
          <span>Claude / ChatGPT pre kancelársku prácu (maily, dokumenty)</span>
        </label>
        <label class="check-item">
          <input type="checkbox" name="temy[]" value="AI nástroje pre tvorbu obsahu a marketing" />
          <span>AI nástroje pre tvorbu obsahu a marketing</span>
        </label>
        <label class="check-item">
          <input type="checkbox" name="temy[]" value="Automatizácia procesov (Make, Zapier, n8n)" />
          <span>Automatizácia procesov (Make, Zapier, n8n)</span>
        </label>
        <label class="check-item">
          <input type="checkbox" name="temy[]" value="AI a legislatíva / EU AI Act" />
          <span>AI a legislatíva / EU AI Act</span>
        </label>
        <label class="check-item">
          <input type="checkbox" name="temy[]" value="AI pre manažérov a lídrov tímov" />
          <span>AI pre manažérov a lídrov tímov</span>
        </label>
      </div>
    </div>

    <div class="divider"></div>

    <!-- 4. Odkaz / voľný komentár -->
    <div class="field">
      <label>Ľubovoľný odkaz alebo komentár</label>
      <textarea name="odkaz" placeholder="Čokoľvek, čo by si nám chcel povedať…" rows="3"></textarea>
    </div>

    <!-- Optional email -->
    <div class="field">
      <label>Tvoj e-mail <span style="font-weight:300;text-transform:none;letter-spacing:0">(nepovinné – ak chceš dostávať novinky)</span></label>
      <input type="email" name="email" placeholder="meno@firma.sk" />
    </div>

    <button type="submit" class="btn" id="submitBtn">Odoslať feedback →</button>
  </form>

  <!-- Success message -->
  <div id="success">
    <span class="icon">🎉</span>
    <h2>Ďakujeme!</h2>
    <p>Tvoj feedback sme dostali.<br>Pomáha nám robiť ďalšie školenia ešte lepšie.</p>
  </div>

  <p class="footer-note">© 2026 Scholaris · alanjozeffiebig@gmail.com</p>
</div>

<script>
  const form = document.getElementById('feedbackForm');
  const btn  = document.getElementById('submitBtn');
  const succ = document.getElementById('success');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    // Check star rating
    const stars = form.querySelector('input[name="hodnotenie"]:checked');
    if (!stars) {
      alert('Prosím, ohodnoť školenie hviezdičkami.');
      return;
    }

    btn.textContent = 'Odosiela sa…';
    btn.disabled = true;

    try {
      const res = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      });

      if (res.ok) {
        form.style.display = 'none';
        succ.style.display = 'block';
      } else {
        throw new Error();
      }
    } catch {
      btn.textContent = 'Odoslať feedback →';
      btn.disabled = false;
      alert('Niečo sa nepodarilo. Skús to znova alebo nás kontaktuj na alanjozeffiebig@gmail.com');
    }
  });
</script>
</body>
</html>
